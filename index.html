<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>專業台股族群看盤介面</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-dark: #0f172a;
            --card-bg: #1e293b;
            --card-hover: #334155;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --accent: #38bdf8;
            --accent-hover: #0ea5e9;
            --news-bg: #0b1120;
            --border: #334155;
        }

        body {
            font-family: 'Noto Sans TC', sans-serif;
            background-color: var(--bg-dark);
            color: var(--text-main);
            margin: 0;
            padding: 15px;
            box-sizing: border-box;
            -webkit-font-smoothing: antialiased;
        }

        h1 {
            text-align: center;
            color: var(--text-main);
            font-size: 22px;
            margin-bottom: 25px;
            letter-spacing: 1px;
        }
        h1 span { color: var(--accent); }

        /* 頂部大族群標籤 */
        .tabs {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            justify-content: center;
            margin-bottom: 25px;
        }

        .tab-btn {
            background-color: transparent;
            color: var(--text-muted);
            border: 1px solid var(--border);
            padding: 8px 16px;
            border-radius: 20px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 500;
            transition: all 0.2s ease;
        }

        .tab-btn:hover, .tab-btn.active {
            background-color: var(--accent);
            color: #000;
            border-color: var(--accent);
        }

        /* 小族群網格 */
        .group-grid {
            display: none;
            grid-template-columns: repeat(auto-fill, minmax(100%, 1fr));
            gap: 15px;
        }
        @media (min-width: 768px) {
            .group-grid { grid-template-columns: repeat(auto-fill, minmax(350px, 1fr)); }
        }
        .group-grid.active { display: grid; }

        .group-card {
            background-color: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
        }

        .group-header {
            padding: 16px;
            font-size: 16px;
            font-weight: 700;
            background-color: rgba(15, 23, 42, 0.4);
            cursor: pointer;
            display: flex;
            justify-content: space-between;
            align-items: center;
            transition: background-color 0.2s;
        }
        .group-header:hover { background-color: var(--card-hover); }
        .group-header .toggle-icon { font-size: 12px; color: var(--accent); transition: transform 0.3s; }
        .group-card.open .toggle-icon { transform: rotate(180deg); }

        /* 卡片式個股列表 */
        .stock-list {
            display: none;
            flex-direction: column;
            border-top: 1px solid var(--border);
        }

        .stock-item {
            padding: 16px;
            border-bottom: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        .stock-item:last-child { border-bottom: none; }

        .stock-top-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .stock-id {
            font-size: 18px;
            font-weight: 700;
            letter-spacing: 0.5px;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .stock-id::before {
            content: '';
            display: inline-block;
            width: 8px;
            height: 8px;
            background-color: var(--accent);
            border-radius: 50%;
        }

        .action-buttons {
            display: flex;
            gap: 8px;
        }

        .btn-link {
            background-color: rgba(56, 189, 248, 0.1);
            color: var(--accent);
            text-decoration: none;
            padding: 6px 12px;
            border-radius: 6px;
            font-size: 13px;
            font-weight: 500;
            transition: all 0.2s;
            border: 1px solid rgba(56, 189, 248, 0.2);
        }
        .btn-link:hover {
            background-color: var(--accent);
            color: #000;
        }

        /* 真實即時新聞區塊 */
        .news-box {
            background-color: var(--news-bg);
            padding: 12px;
            border-radius: 8px;
            font-size: 14px;
            line-height: 1.5;
            border-left: 3px solid var(--border);
            transition: border-color 0.3s;
        }
        .news-box.loaded { border-left-color: #10b981; /* 成功抓取顯示綠邊 */ }
        .news-box.error { border-left-color: #ef4444; }

        .news-title {
            color: #e2e8f0;
            text-decoration: none;
            display: block;
        }
        .news-title:hover {
            color: var(--accent);
            text-decoration: underline;
        }
        
        .loading-pulse {
            animation: pulse 1.5s cubic-bezier(0.4, 0, 0.6, 1) infinite;
            color: var(--text-muted);
            font-size: 13px;
            display: flex;
            align-items: center;
            gap: 6px;
        }
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: .5; }
        }
    </style>
</head>
<body>

    <h1>📈 專業台股 <span>族群看盤系統</span></h1>
    
    <div class="tabs" id="tabs-container"></div>
    <div id="content-container"></div>

            "Apple蘋果": ["0050.TW","0056.TW","1582.TW","1904.TW","2301.TW","2308.TW","2313.TW","2317.TW","2324.TW","2327.TW","3008.TWO","2330.TW","2454.TW","2357.TW","2379.TW"],
            "太陽能": ["0050.TW","0056.TW","2308.TW","5871.TW","6409.TWO","2409.TW","5483.TW","2371.TW","3023.TWO","1513.TW","3665.TWO","5434.TW","3583.TWO"],
            "玻璃基板": ["0050.TW","0056.TW","1717.TW","1802.TW","1809.TW","2467.TW","3037.TWO","3055.TWO","3131.TWO","3189.TWO","7734.TW","3583.TWO","6664.TWO"],
            "Tesla特斯拉": ["0050.TW","0056.TW","1536.TW","1723.TW","2066.TW","2201.TW","2308.TW","2313.TW","2360.TW","2392.TW","3665.TWO","6121.TWO"],
            "AI PC": ["0050.TW","0056.TW","2454.TW","2458.TW","6138.TWO","2344.TW","2408.TW","2330.TW","3711.TWO","4966.TW","5269.TW","3017.TWO","2357.TW"],
            "AI人工智慧": ["0050.TW","0056.TW","2330.TW","2356.TW","2382.TW","2439.TW","2454.TW","3189.TWO","3231.TWO","3443.TWO","3661.TWO","2357.TW"],
            "散熱模組": ["0050.TW","0056.TW","2354.TW","2421.TW","3017.TWO","3324.TWO","3483.TWO","6230.TWO","6591.TWO","3338.TWO","1722.TW","3653.TWO"],
            "生技醫療": ["0050.TW","0056.TW","4726.TW","6662.TWO","3224.TWO","4147.TW","6472.TWO","6541.TWO","6550.TWO","6589.TWO"]
            // 由於版面限制，我在這裡示範保留了部分資料。
            // **請將您前一次提供的完整 techDict 貼回這裡取代，不會影響任何功能**。
        };

        const categoryMapping = {
            "半導體與先進運算": ["AI PC", "AI人工智慧", "ASIC", "CoWoS", "FOPLP扇出型封裝", "HBM", "HPC", "LPU", "次世代半導體", "矽智財IP", "矽晶圓", "記憶體", "功率半導體", "3DIC聯盟", "AMD", "ChatGPT", "TPU"],
            "電子與網通設備": ["5G", "O-RAN", "BBU", "顯示器", "Mini LED", "Micro LED", "PCB", "PCB材料", "散熱模組", "被動元件", "電容", "電阻", "電感", "保護元件", "濾波器", "石英元件", "銅箔基板", "銅箔", "Type-c", "連接器", "光通訊", "WiFi 6", "衛星/低軌衛星", "低軌衛星", "穿載裝置", "折疊機", "iPhone", "Apple蘋果", "Airpods", "小米", "玻璃基板", "電源供應器", "IC載板", "變壓器", "鋁質電容"],
            "車用與綠能環保": ["車用電子", "車聯網", "MIH", "鴻海MIH電動車平台", "Tesla特斯拉", "電動車", "自動駕駛", "ADAS", "寧德時代", "氫燃料電池", "太陽能", "風力發電", "碳權", "水資源", "智慧電網", "氣候變遷", "環境工程", "空污", "鈣鈦礦"],
            "生技醫療與照護": ["生技醫療", "新藥", "新藥研發", "原料藥", "生物相似藥", "再生醫療", "醫療器材耗材", "醫療儀器設備", "智慧醫療", "長期照護", "長照", "視力保健", "保健食品", "美容", "醫美保養妝品", "製藥業", "農業生技", "生物檢測", "醫療管理顧問", "醫療院所", "衛生保健", "醫藥通路", "寵物", "防疫"],
            "新興科技與軟體": ["元宇宙", "VR虛擬實境", "AR擴增實境", "3D列印", "3D感測", "無人機", "智慧音箱", "智慧城市", "智慧型機器人/機械手臂", "行動支付", "第三方支付", "Apple Pay", "虛擬貨幣", "比特幣挖礦", "資安", "RFID", "NFC", "指紋辨識", "人臉辨識", "AWS", "Oracle甲骨文", "IOT物聯網", "快速充電", "無線充電", "Chromebook"],
            "傳產與消費生活": ["雙十一", "資訊月", "夏季", "Fun暑假", "旅遊", "電商", "零售", "共享單車", "運動健身", "二胎化", "建材", "資產股", "一帶一路", "福建自貿區", "東協", "美元升值", "A股入摩", "黃金", "物流", "文創", "居家辦公(WFH)", "遠距教學", "宅經濟", "線上遊戲", "電競", "軍工/國防", "航空/航太", "特用化學"],
            "國際大廠與供應鏈": ["CES", "MWC", "TPP", "FANG", "GB200", "GB300", "PS5", "任天堂Switch", "Home Depot", "NIKE", "Under Armour", "DANCE"]
        };

        // 未分類防呆
        const categorizedKeys = new Set(Object.values(categoryMapping).flat());
        categoryMapping["其他"] = Object.keys(techDict).filter(k => !categorizedKeys.has(k));
        if(categoryMapping["其他"].length === 0) delete categoryMapping["其他"];

        const tabsContainer = document.getElementById('tabs-container');
        const contentContainer = document.getElementById('content-container');
        let isFirstTab = true;

        // 生成畫面結構
        for (const [superCat, subCats] of Object.entries(categoryMapping)) {
            // Tab 按鈕
            const tabBtn = document.createElement('button');
            tabBtn.className = `tab-btn ${isFirstTab ? 'active' : ''}`;
            tabBtn.innerText = superCat;
            tabBtn.onclick = () => switchTab(superCat);
            tabsContainer.appendChild(tabBtn);

            // 群組 Grid
            const gridDiv = document.createElement('div');
            gridDiv.className = `group-grid ${isFirstTab ? 'active' : ''}`;
            gridDiv.id = `grid-${superCat}`;

            subCats.forEach(subCat => {
                if (!techDict[subCat]) return; 

                const cardDiv = document.createElement('div');
                cardDiv.className = 'group-card';
                cardDiv.id = `card-${subCat}`;
                
                // 群組標題 (可點擊收合)
                const headerDiv = document.createElement('div');
                headerDiv.className = 'group-header';
                headerDiv.innerHTML = `<span>📂 ${subCat} <small style="color:#64748b; font-size:12px; margin-left:8px;">(${techDict[subCat].length}檔)</small></span> <span class="toggle-icon">▼</span>`;
                headerDiv.onclick = () => toggleGroup(subCat);

                // 個股清單容器 (卡片式)
                const listContainer = document.createElement('div');
                listContainer.className = 'stock-list';
                listContainer.id = `list-${subCat}`;

                let listHTML = '';
                techDict[subCat].forEach(stockStr => {
                    const stockId = stockStr.split('.')[0]; 
                    // Google 新聞搜尋網址
                    const gNewsUrl = `https://news.google.com/search?q=${stockId}+股票&hl=zh-TW&gl=TW&ceid=TW:zh-Hant`;
                    
                    listHTML += `
                        <div class="stock-item">
                            <div class="stock-top-row">
                                <div class="stock-id">${stockId}</div>
                                <div class="action-buttons">
                                    <a href="https://tw.stock.yahoo.com/quote/${stockStr}" target="_blank" class="btn-link">報價走勢</a>
                                    <a href="${gNewsUrl}" target="_blank" class="btn-link">Google 新聞</a>
                                </div>
                            </div>
                            <div class="news-box" id="news-${subCat}-${stockId}" data-stock="${stockId}" data-loaded="false">
                                </div>
                        </div>
                    `;
                });

                listContainer.innerHTML = listHTML;
                cardDiv.appendChild(headerDiv);
                cardDiv.appendChild(listContainer);
                gridDiv.appendChild(cardDiv);
            });

            contentContainer.appendChild(gridDiv);
            isFirstTab = false;
        }

        // 切換大族群
        function switchTab(targetCat) {
            document.querySelectorAll('.tab-btn').forEach(btn => {
                if(btn.innerText === targetCat) btn.classList.add('active');
                else btn.classList.remove('active');
            });
            document.querySelectorAll('.group-grid').forEach(grid => {
                if(grid.id === `grid-${targetCat}`) grid.classList.add('active');
                else grid.classList.remove('active');
            });
        }

        // 展開/收合 小族群 & 觸發自動抓取真實新聞
        function toggleGroup(subCat) {
            const card = document.getElementById(`card-${subCat}`);
            const listContainer = document.getElementById(`list-${subCat}`);
            const isVisible = listContainer.style.display === 'flex';
            
            if (isVisible) {
                listContainer.style.display = 'none';
                card.classList.remove('open');
            } else {
                listContainer.style.display = 'flex';
                card.classList.add('open');
                
                // 找到該清單下所有的新聞欄位，若還沒載入過，就開始抓取
                const newsBoxes = listContainer.querySelectorAll('.news-box');
                newsBoxes.forEach(box => {
                    if (box.dataset.loaded === 'false') {
                        fetchRealLatestNews(box.dataset.stock, box.id);
                    }
                });
            }
        }

        // 動態抓取 Google News RSS (使用免費代理繞過 CORS)
        async function fetchRealLatestNews(stockId, elementId) {
            const el = document.getElementById(elementId);
            // 標示狀態為載入中，避免重複觸發
            el.dataset.loaded = 'loading'; 
            el.innerHTML = '<div class="loading-pulse"><span>⏳</span> 即時搜尋最新新聞中...</div>';

            try {
                const query = encodeURIComponent(`${stockId} 股票`);
                const rssUrl = `https://news.google.com/rss/search?q=${query}&hl=zh-TW&gl=TW&ceid=TW:zh-Hant`;
                
                // 透過 allorigins 免費代理將 RSS 轉為 JSON 讓我們可以在純前端讀取
                const proxyUrl = `https://api.allorigins.win/get?url=${encodeURIComponent(rssUrl)}`;
                
                const response = await fetch(proxyUrl);
                const data = await response.json();
                
                // 解析 RSS (XML)
                const parser = new DOMParser();
                const xmlDoc = parser.parseFromString(data.contents, "text/xml");
                const item = xmlDoc.querySelector("item");

                if (item) {
                    let title = item.querySelector("title").textContent;
                    let link = item.querySelector("link").textContent;
                    // 清理標題後綴的來源名稱 (例如 " - Yahoo奇摩股市")
                    title = title.split(' - ')[0]; 
                    
                    el.innerHTML = `<a href="${link}" target="_blank" class="news-title">📰 ${title}</a>`;
                    el.classList.add('loaded');
                    el.dataset.loaded = 'true';
                } else {
                    el.innerHTML = '<span style="color:#64748b;">暫無近期相關新聞</span>';
                    el.dataset.loaded = 'true';
                }
            } catch (error) {
                console.error("Fetch News Error:", error);
                el.innerHTML = '<span style="color:#ef4444; font-size: 12px;">新聞抓取失敗，請直接點擊上方 Google 新聞按鈕</span>';
                el.classList.add('error');
                // 失敗的話重置狀態，下次點開再試一次
                el.dataset.loaded = 'false'; 
            }
        }
    </script>
</body>
</html>
