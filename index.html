<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>專業台股族群看盤介面</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #0b0e14;
            --card-bg: #151a22;
            --card-hover: #1e2532;
            --text-main: #e2e8f0;
            --text-muted: #94a3b8;
            --accent: #00d2ff;
            --accent-hover: #0088ff;
            --border: #2e3c50;
            --table-header: #1e293b;
        }

        body {
            font-family: 'Noto Sans TC', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            margin: 0;
            padding: 20px;
            box-sizing: border-box;
        }

        h1 {
            text-align: center;
            color: var(--accent);
            letter-spacing: 2px;
            margin-bottom: 30px;
        }

        /* 頂部大族群標籤 */
        .tabs {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            justify-content: center;
            margin-bottom: 30px;
        }

        .tab-btn {
            background-color: var(--card-bg);
            color: var(--text-main);
            border: 1px solid var(--border);
            padding: 10px 20px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 16px;
            font-weight: 500;
            transition: all 0.3s ease;
        }

        .tab-btn:hover, .tab-btn.active {
            background-color: var(--accent);
            color: #000;
            border-color: var(--accent);
            box-shadow: 0 0 10px rgba(0, 210, 255, 0.5);
        }

        /* 小族群網格 */
        .group-grid {
            display: none;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 20px;
        }

        .group-grid.active {
            display: grid;
        }

        .group-card {
            background-color: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: 10px;
            overflow: hidden;
            transition: transform 0.2s ease, box-shadow 0.2s ease;
        }

        .group-card:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.5);
            border-color: var(--accent-hover);
        }

        .group-header {
            padding: 15px 20px;
            font-size: 18px;
            font-weight: 700;
            background-color: rgba(30, 41, 59, 0.5);
            cursor: pointer;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .group-header:hover {
            background-color: var(--card-hover);
            color: var(--accent);
        }

        /* 個股表格 */
        .stock-table-container {
            display: none;
            padding: 0;
            border-top: 1px solid var(--border);
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        th, td {
            padding: 12px 15px;
            text-align: left;
            border-bottom: 1px solid var(--border);
            font-size: 14px;
        }

        th {
            background-color: var(--table-header);
            color: var(--text-muted);
            font-weight: 500;
        }

        td a {
            color: var(--accent);
            text-decoration: none;
            transition: color 0.2s;
        }

        td a:hover {
            color: #fff;
            text-decoration: underline;
        }

        .summary-cell {
            color: #a7f3d0;
            font-size: 13px;
            line-height: 1.4;
        }

        .summary-empty {
            color: var(--text-muted);
            font-style: italic;
            font-size: 12px;
        }

        .stock-id {
            font-weight: 700;
            letter-spacing: 1px;
        }
    </style>
</head>

                else btn.classList.remove('active');
            });

            // 更新 Grid 顯示
            document.querySelectorAll('.group-grid').forEach(grid => {
                if(grid.id === `grid-${targetCat}`) grid.classList.add('active');
                else grid.classList.remove('active');
            });
        }

        // 展開/收合 個股表格

            const tableContainer = document.getElementById(`table-${subCat}`);
            const isVisible = tableContainer.style.display === 'block';
            
            // 可選功能：自動收合其他卡片（目前設定為可同時展開多個，若要單一展開可在此加邏輯）
            
            tableContainer.style.display = isVisible ? 'none' : 'block';
